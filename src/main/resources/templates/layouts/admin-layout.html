<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE - Admin Panel">Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background-color: #f0f2f5; }

        /* ===== SIDEBAR ===== */
        .admin-sidebar {
            width: 260px;
            min-height: 100vh;
            background: linear-gradient(180deg, #1a1f2e 0%, #16213e 100%);
            position: fixed;
            top: 0; left: 0;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 20px rgba(0,0,0,0.15);
            transition: all 0.3s;
        }
        .sidebar-brand {
            padding: 24px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            text-decoration: none;
        }
        .sidebar-brand h5 {
            color: #fff;
            font-weight: 700;
            margin: 0;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
        }
        .sidebar-brand small {
            color: rgba(255,255,255,0.4);
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .sidebar-nav { padding: 16px 0; flex: 1; }
        .sidebar-section-title {
            color: rgba(255,255,255,0.35);
            font-size: 0.68rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 12px 20px 6px;
        }
        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 11px 20px;
            color: rgba(255,255,255,0.65);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            border-left: 3px solid transparent;
            transition: all 0.2s;
            margin: 2px 10px;
            border-radius: 8px;
        }
        .sidebar-link:hover {
            color: #fff;
            background: rgba(255,255,255,0.08);
        }
        .sidebar-link.active {
            color: #fff;
            background: rgba(99, 102, 241, 0.2);
            border-left: 3px solid #6366f1;
        }
        .sidebar-link i { font-size: 1.1rem; width: 20px; text-align: center; }
        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid rgba(255,255,255,0.08);
        }
        .sidebar-footer .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border-radius: 10px;
            background: rgba(255,255,255,0.06);
        }
        .avatar-circle {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 700; font-size: 0.9rem;
        }
        .user-name { color: #fff; font-size: 0.85rem; font-weight: 600; }
        .user-role { color: rgba(255,255,255,0.4); font-size: 0.72rem; }

        /* ===== MAIN CONTENT ===== */
        .admin-main { margin-left: 260px; min-height: 100vh; }
        .admin-topbar {
            background: #fff;
            padding: 14px 32px;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 900;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .topbar-title { font-weight: 700; font-size: 1.15rem; color: #111827; }
        .topbar-subtitle { font-size: 0.8rem; color: #9ca3af; margin-top: 2px; }
        .admin-content { padding: 28px 32px; }

        /* ===== CARDS ===== */
        .stat-card {
            background: #fff;
            border-radius: 14px;
            padding: 22px 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            border: 1px solid rgba(0,0,0,0.04);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .stat-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
        .stat-icon {
            width: 52px; height: 52px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem;
        }
        .card-section {
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            border: 1px solid rgba(0,0,0,0.04);
            overflow: hidden;
        }
        .card-section-header {
            padding: 18px 24px;
            border-bottom: 1px solid #f3f4f6;
            font-weight: 600;
            font-size: 0.95rem;
            color: #374151;
        }

        /* ===== TABLE ===== */
        .admin-table thead th {
            background: #f9fafb;
            color: #6b7280;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 13px 16px;
            border-bottom: 1px solid #e5e7eb;
            border-top: none;
        }
        .admin-table tbody td {
            padding: 14px 16px;
            vertical-align: middle;
            border-bottom: 1px solid #f3f4f6;
            color: #374151;
            font-size: 0.9rem;
        }
        .admin-table tbody tr:last-child td { border-bottom: none; }
        .admin-table tbody tr:hover { background: #f9fafb; }

        /* ===== STATUS BADGES ===== */
        .badge-pending  { background: #fef3c7; color: #92400e; }
        .badge-processing { background: #dbeafe; color: #1e40af; }
        .badge-shipping { background: #e0f2fe; color: #075985; }
        .badge-delivered { background: #d1fae5; color: #065f46; }
        .badge-cancelled { background: #fee2e2; color: #991b1b; }

        /* ===== MISC ===== */
        .page-link { border-radius: 8px; border: none; color: #6b7280; margin: 0 2px; }
        .page-item.active .page-link { background: #6366f1; border-color: #6366f1; }
        .form-control:focus, .form-select:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
        .btn-primary { background: #6366f1; border-color: #6366f1; }
        .btn-primary:hover { background: #4f46e5; border-color: #4f46e5; }
    </style>
    <th:block layout:fragment="head-extra"></th:block>
</head>
<body>

<!-- Sidebar -->
<nav class="admin-sidebar">
    <a href="/admin/dashboard" class="sidebar-brand text-decoration-none d-block">
        <div class="d-flex align-items-center gap-3">
            <div style="font-size:1.8rem">💻</div>
            <div>
                <h5 class="mb-0">Laptop Shop</h5>
                <small>Admin Panel</small>
            </div>
        </div>
    </a>

    <div class="sidebar-nav">
        <div class="sidebar-section-title">Tổng Quan</div>
        <a th:href="@{/admin/dashboard}"
           th:classappend="${activeMenu == 'dashboard'} ? 'active' : ''"
           class="sidebar-link">
            <i class="bi bi-grid-1x2-fill"></i> Dashboard
        </a>

        <div class="sidebar-section-title mt-2">Quản Lý</div>
        <a th:href="@{/admin/products}"
           th:classappend="${activeMenu == 'products'} ? 'active' : ''"
           class="sidebar-link">
            <i class="bi bi-box-seam-fill"></i> Sản Phẩm
        </a>
        <a th:href="@{/admin/categories}"
           th:classappend="${activeMenu == 'categories'} ? 'active' : ''"
           class="sidebar-link">
            <i class="bi bi-tags-fill"></i> Danh Mục
        </a>
        <a th:href="@{/admin/orders}"
           th:classappend="${activeMenu == 'orders'} ? 'active' : ''"
           class="sidebar-link">
            <i class="bi bi-receipt"></i> Đơn Hàng
        </a>

        <div class="sidebar-section-title mt-2">Khác</div>
        <a href="/" class="sidebar-link">
            <i class="bi bi-house-door-fill"></i> Về Trang Chủ
        </a>
    </div>

    <div class="sidebar-footer">
        <div class="user-info">
            <div class="avatar-circle" sec:authentication="name" th:text="${#strings.substring(#authentication.name, 0, 1).toUpperCase()}">A</div>
            <div>
                <div class="user-name" sec:authentication="name">Admin</div>
                <div class="user-role">Quản trị viên</div>
            </div>
        </div>
        <form th:action="@{/logout}" method="post" class="mt-2">
            <button type="submit" class="btn btn-sm w-100 text-danger"
                    style="background:rgba(239,68,68,0.1); border:none; padding:8px;">
                <i class="bi bi-box-arrow-left"></i> Đăng Xuất
            </button>
        </form>
    </div>
</nav>

<!-- Main -->
<div class="admin-main">
    <!-- Topbar -->
    <div class="admin-topbar">
        <div>
            <div class="topbar-title" layout:fragment="page-title">Quản Trị</div>
            <div class="topbar-subtitle" layout:fragment="page-subtitle">Admin Panel</div>
        </div>
        <div layout:fragment="topbar-actions"></div>
    </div>

    <!-- Content -->
    <div class="admin-content">
        <!-- Flash Messages -->
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show shadow-sm mb-4" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show shadow-sm mb-4" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div layout:fragment="content">
            <!-- Page content goes here -->
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<th:block layout:fragment="scripts"></th:block>
</body>
</html>
