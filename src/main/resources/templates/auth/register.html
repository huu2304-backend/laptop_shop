<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký - Laptop Shop</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .register-container {
            background-color: #fff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #666;
            font-weight: 500;
        }
        input[type="text"],
        input[type="password"],
        input[type="email"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus,
        input[type="password"]:focus,
        input[type="email"]:focus {
            border-color: #2196F3;
            outline: none;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background-color: #2196F3;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .btn:hover {
            background-color: #1976D2;
        }
        .login-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }
        .login-link a {
            color: #2196F3;
            text-decoration: none;
        }
        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="register-container">
    <h2>Đăng Ký Tài Khoản</h2>
    
    <div th:if="${error}" style="color: #f44336; margin-bottom: 15px; text-align: center; font-size: 14px;" th:text="${error}">
        Lỗi đăng ký
    </div>
    
    <form th:action="@{/register}" method="post" th:object="${registerDTO}">
        <div class="form-group">
            <label for="username">Tên đăng nhập</label>
            <input type="text" id="username" th:field="*{username}" placeholder="Nhập tên đăng nhập" required autofocus>
            <div th:if="${#fields.hasErrors('username')}" th:errors="*{username}" style="color: #f44336; font-size: 13px; margin-top: 5px;"></div>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" th:field="*{email}" placeholder="Nhập địa chỉ email" required>
            <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}" style="color: #f44336; font-size: 13px; margin-top: 5px;"></div>
        </div>
        <div class="form-group">
            <label for="password">Mật khẩu</label>
            <input type="password" id="password" th:field="*{password}" placeholder="Nhập mật khẩu" required>
            <div th:if="${#fields.hasErrors('password')}" th:errors="*{password}" style="color: #f44336; font-size: 13px; margin-top: 5px;"></div>
        </div>
        <div class="form-group">
            <label for="confirmPassword">Nhập lại mật khẩu</label>
            <input type="password" id="confirmPassword" th:field="*{confirmPassword}" placeholder="Nhập lại mật khẩu" required>
            <div th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}" style="color: #f44336; font-size: 13px; margin-top: 5px;"></div>
        </div>
        <button type="submit" class="btn">Đăng ký</button>
    </form>
    
    <div class="login-link">
        Đã có tài khoản? <a th:href="@{/login}">Đăng nhập ngay</a>
    </div>
</div>

</body>
</html>
