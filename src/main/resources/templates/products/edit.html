<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chỉnh Sửa Sản Phẩm</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            max-width: 600px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .error-message {
            color: red;
            font-size: 14px;
            margin-top: 5px;
            display: block;
        }
        .btn {
            padding: 10px 15px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-submit {
            background-color: #2196F3;
            color: white;
        }
        .btn-cancel {
            background-color: #ccc;
            color: #333;
            text-decoration: none;
            padding: 10px 15px;
            display: inline-block;
            box-sizing: border-box;
            text-align: center;
            border-radius: 4px;
        }
    </style>
</head>
<body>
<h2>Chỉnh Sửa Sản Phẩm</h2>
<form th:action="@{/products/edit/{id}(id=${product.id})}" th:object="${product}" method="post" enctype="multipart/form-data">
    <input type="hidden" th:field="*{id}" />
    <input type="hidden" th:field="*{imageUrl}" />

    <div class="form-group">
        <label>Tên Sản Phẩm:</label>
        <input type="text" th:field="*{name}" />
        <span class="error-message" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
    </div>

    <div class="form-group">
        <label>Giá Sản Phẩm (VNĐ):</label>
        <input type="number" step="any" th:field="*{price}" />
        <span class="error-message" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></span>
    </div>

    <div class="form-group">
        <label>Số Lượng:</label>
        <input type="number" th:field="*{quantity}" />
        <span class="error-message" th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}"></span>
    </div>

    <div class="form-group">
        <label>Danh Mục (Hãng Sản Xuất):</label>
        <select th:field="*{categoryId}">
            <option value="">-- Chọn danh mục --</option>
            <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
        </select>
        <span class="error-message" th:if="${#fields.hasErrors('categoryId')}" th:errors="*{categoryId}"></span>
    </div>

    <div class="form-group">
        <label>Ảnh Sản Phẩm (Để trống nếu muốn giữ nguyên ảnh cũ):</label>
        <input type="file" name="imageFile" accept="image/*" id="imageInput" />
        
        <div style="margin-top: 10px;">
            <!-- Current Image -->
            <div id="currentImageContainer" th:if="*{imageUrl != null and !imageUrl.isEmpty()}">
                <p style="margin: 0 0 5px 0; font-size: 14px; font-weight: bold;">Ảnh hiện tại:</p>
                <img th:src="*{imageUrl}" style="width: 120px; height: auto; border: 1px solid #ccc; border-radius: 4px;" alt="Current Image" />
            </div>
            
            <!-- New Image Preview -->
            <div id="previewContainer" style="display: none; margin-top: 10px;">
                <p style="margin: 0 0 5px 0; font-size: 14px; font-weight: bold; color: #2196F3;">Ảnh mới chọn:</p>
                <img id="imagePreview" style="width: 120px; height: auto; border: 1px solid #ccc; border-radius: 4px;" alt="New Image Preview" />
            </div>
        </div>
        <span class="error-message" th:if="${#fields.hasErrors('imageUrl')}" th:errors="*{imageUrl}"></span>
    </div>

    <div class="form-group">
        <label>Mô Tả Sản Phẩm:</label>
        <textarea th:field="*{description}" rows="4"></textarea>
        <span class="error-message" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></span>
    </div>

    <div style="margin-top: 20px;">
        <button type="submit" class="btn btn-submit">Cập Nhật Sản Phẩm</button>
        <a th:href="@{/products}" class="btn btn-cancel">Hủy</a>
    </div>
</form>
<script>
    document.getElementById('imageInput').addEventListener('change', function(event) {
        const file = event.target.files[0];
        const previewContainer = document.getElementById('previewContainer');
        const imagePreview = document.getElementById('imagePreview');
        const currentImageContainer = document.getElementById('currentImageContainer');
        
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                imagePreview.src = e.target.result;
                previewContainer.style.display = 'block';
                if (currentImageContainer) {
                    currentImageContainer.style.opacity = '0.5';
                }
            };
            reader.readAsDataURL(file);
        } else {
            previewContainer.style.display = 'none';
            if (currentImageContainer) {
                currentImageContainer.style.opacity = '1';
            }
        }
    });
</script>
</body>
</html>
