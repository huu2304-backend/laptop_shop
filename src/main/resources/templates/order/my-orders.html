<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đơn Hàng Của Tôi - Laptop Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .order-card {
            border-radius: 14px;
            transition: box-shadow 0.2s;
        }
        .order-card:hover { box-shadow: 0 8px 24px rgba(0,0,0,0.1) !important; }
        .badge-pending    { background: #fef3c7; color: #92400e; }
        .badge-processing { background: #dbeafe; color: #1e40af; }
        .badge-shipping   { background: #e0f2fe; color: #075985; }
        .badge-delivered  { background: #d1fae5; color: #065f46; }
        .badge-cancelled  { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body class="bg-light d-flex flex-column min-vh-100">

<div th:replace="~{fragments/navbar :: navbar('')}"></div>

<div class="container py-5 flex-grow-1">
    <div class="d-flex align-items-center gap-3 mb-4">
        <h2 class="fw-bold mb-0"><i class="bi bi-bag-check-fill text-primary me-2"></i>Đơn Hàng Của Tôi</h2>
        <span class="badge bg-primary rounded-pill" th:text="${orders.totalElements} + ' đơn'">0 đơn</span>
    </div>

    <!-- Empty State -->
    <div th:if="${orders.empty}" class="text-center py-5">
        <i class="bi bi-bag-x" style="font-size:4rem;color:#dee2e6;"></i>
        <h5 class="mt-3 text-muted">Bạn chưa có đơn hàng nào</h5>
        <a href="/shop" class="btn btn-primary mt-3 rounded-pill px-4">
            <i class="bi bi-bag-heart me-2"></i>Bắt đầu mua sắm
        </a>
    </div>

    <!-- Order List -->
    <div th:unless="${orders.empty}">
        <div class="card order-card border-0 shadow-sm mb-4" th:each="order : ${orders.content}">
            <div class="card-body p-4">
                <div class="row align-items-center g-3">
                    <!-- Order Meta -->
                    <div class="col-md-3">
                        <div class="fw-bold fs-6">Đơn hàng <span class="text-primary" th:text="'#' + ${order.id}">#1</span></div>
                        <div class="text-muted small mt-1">
                            <i class="bi bi-calendar3 me-1"></i>
                            <span th:text="${#temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm')}">--</span>
                        </div>
                    </div>

                    <!-- Address -->
                    <div class="col-md-3">
                        <div class="small text-muted fw-semibold">Địa chỉ giao hàng:</div>
                        <div class="small" th:text="${order.shippingAddress}">--</div>
                        <div class="small text-muted mt-1">
                            <i class="bi bi-telephone me-1"></i><span th:text="${order.phoneNumber}">--</span>
                        </div>
                    </div>

                    <!-- Total -->
                    <div class="col-md-2">
                        <div class="small text-muted fw-semibold">Tổng tiền:</div>
                        <div class="fw-bold text-danger"
                             th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</div>
                        <div class="small text-muted" th:text="${order.orderDetails.size()} + ' sản phẩm'">0 SP</div>
                    </div>

                    <!-- Status -->
                    <div class="col-md-2 text-center">
                        <span class="badge badge-pending rounded-pill px-3 py-2"
                              th:if="${order.status == 'PENDING'}">
                            <i class="bi bi-hourglass-split me-1"></i>Chờ xử lý
                        </span>
                        <span class="badge badge-processing rounded-pill px-3 py-2"
                              th:if="${order.status == 'PROCESSING'}">
                            <i class="bi bi-gear me-1"></i>Đang chuẩn bị
                        </span>
                        <span class="badge badge-shipping rounded-pill px-3 py-2"
                              th:if="${order.status == 'SHIPPING'}">
                            <i class="bi bi-truck me-1"></i>Đang giao
                        </span>
                        <span class="badge badge-delivered rounded-pill px-3 py-2"
                              th:if="${order.status == 'DELIVERED'}">
                            <i class="bi bi-check2-circle me-1"></i>Đã giao
                        </span>
                        <span class="badge badge-cancelled rounded-pill px-3 py-2"
                              th:if="${order.status == 'CANCELLED'}">
                            <i class="bi bi-x-circle me-1"></i>Đã hủy
                        </span>
                    </div>

                    <!-- Products Preview -->
                    <div class="col-md-2 text-end">
                        <div class="d-flex justify-content-end gap-1 mb-2">
                            <img th:each="detail, stat : ${order.orderDetails}"
                                 th:if="${stat.index < 3}"
                                 th:src="${detail.product.imageUrl}"
                                 style="width:40px;height:40px;object-fit:cover;border-radius:8px;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.1);"
                                 onerror="this.src='https://placehold.co/40x40?text=img'">
                            <div th:if="${order.orderDetails.size() > 3}"
                                 style="width:40px;height:40px;border-radius:8px;background:#f3f4f6;display:flex;align-items:center;justify-content:center;"
                                 class="small text-muted fw-bold"
                                 th:text="'+' + (${order.orderDetails.size()} - 3)">+1</div>
                        </div>
                    </div>
                </div>

                <!-- Expandable product details (click to show) -->
                <div th:if="${!order.orderDetails.empty}">
                    <button class="btn btn-link btn-sm text-muted text-decoration-none p-0 mt-2"
                            type="button" data-bs-toggle="collapse"
                            th:data-bs-target="'#items-' + ${order.id}">
                        <i class="bi bi-chevron-down me-1"></i>Xem chi tiết sản phẩm
                    </button>
                    <div class="collapse mt-3" th:id="'items-' + ${order.id}">
                        <div class="table-responsive">
                            <table class="table table-sm mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th>Sản phẩm</th>
                                        <th class="text-center">Số lượng</th>
                                        <th class="text-end">Đơn giá</th>
                                        <th class="text-end">Thành tiền</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="detail : ${order.orderDetails}">
                                        <td class="d-flex align-items-center gap-2">
                                            <img th:src="${detail.product.imageUrl}"
                                                 style="width:36px;height:36px;object-fit:cover;border-radius:6px;"
                                                 onerror="this.src='https://placehold.co/36x36?text=img'">
                                            <span class="fw-semibold small" th:text="${detail.product.name}">SP</span>
                                        </td>
                                        <td class="text-center align-middle">
                                            <span class="badge bg-secondary rounded-pill" th:text="${detail.quantity}">1</span>
                                        </td>
                                        <td class="text-end align-middle small"
                                            th:text="${#numbers.formatDecimal(detail.price, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</td>
                                        <td class="text-end align-middle text-danger fw-semibold small"
                                            th:text="${#numbers.formatDecimal(detail.price.multiply(T(java.math.BigDecimal).valueOf(detail.quantity)), 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Pagination -->
        <nav th:if="${orders.totalPages > 1}" class="mt-2">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${orders.first ? 'disabled' : ''}">
                    <a class="page-link" th:href="@{/my-orders(page=${orders.number - 1})}">&laquo;</a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, orders.totalPages - 1)}"
                    th:classappend="${orders.number == i ? 'active' : ''}">
                    <a class="page-link" th:href="@{/my-orders(page=${i})}" th:text="${i + 1}">1</a>
                </li>
                <li class="page-item" th:classappend="${orders.last ? 'disabled' : ''}">
                    <a class="page-link" th:href="@{/my-orders(page=${orders.number + 1})}">&raquo;</a>
                </li>
            </ul>
        </nav>
    </div>
</div>

<footer class="bg-dark text-light py-4 mt-auto">
    <div class="container text-center">
        <p class="mb-0 small">&copy; 2026 Laptop Shop. All rights reserved.</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
