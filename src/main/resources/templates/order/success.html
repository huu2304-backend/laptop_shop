<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt Hàng Thành Công - Laptop Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .success-icon { font-size: 5rem; color: #198754; animation: pop 0.5s ease; }
        @keyframes pop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="bg-light d-flex flex-column min-vh-100">

<div th:replace="~{fragments/navbar :: navbar('')}"></div>

<div class="container py-5 flex-grow-1">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="card border-0 shadow-sm p-5" style="border-radius:20px;">
                <div class="success-icon mb-4">
                    <i class="bi bi-check-circle-fill"></i>
                </div>
                <h2 class="fw-bold text-success mb-2">Đặt Hàng Thành Công!</h2>
                <p class="text-muted mb-4">Cảm ơn bạn đã tin tưởng mua hàng tại Laptop Shop. Chúng tôi sẽ liên hệ xác nhận đơn hàng sớm nhất.</p>
                <div class="d-flex gap-3 justify-content-center flex-wrap">
                    <a href="/my-orders" class="btn btn-primary px-4">
                        <i class="bi bi-bag-check me-2"></i>Xem Đơn Hàng Của Tôi
                    </a>
                    <a href="/shop" class="btn btn-outline-secondary px-4">
                        <i class="bi bi-bag-heart me-2"></i>Tiếp Tục Mua Sắm
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="bg-dark text-light py-4 mt-auto">
    <div class="container text-center">
        <p class="mb-0 small">&copy; 2026 Laptop Shop. All rights reserved.</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
