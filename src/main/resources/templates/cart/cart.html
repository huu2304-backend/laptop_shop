<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ Hàng - Laptop Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>* { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-light d-flex flex-column min-vh-100">

<div th:replace="~{fragments/navbar :: navbar('')}"></div>

<div class="container py-5 flex-grow-1">
    <div class="d-flex align-items-center mb-4 gap-3">
        <h2 class="fw-bold mb-0">Giỏ Hàng Của Bạn</h2>
        <span class="badge bg-primary rounded-pill" th:text="${cartCount} + ' sản phẩm'">0 sản phẩm</span>
    </div>

    <!-- Flash Messages -->
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-circle-fill me-2"></i><span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${cartItems.empty}" class="text-center py-5">
        <i class="bi bi-cart-x" style="font-size:4rem;color:#dee2e6;"></i>
        <h4 class="mt-3 text-muted">Giỏ hàng của bạn đang trống</h4>
        <a href="/shop" class="btn btn-primary mt-3 rounded-pill px-4">
            <i class="bi bi-bag-heart me-2"></i>Tiếp tục mua sắm
        </a>
    </div>

    <div th:unless="${cartItems.empty}">
        <div class="row g-4">
            <div class="col-lg-8">
                <div class="card border-0 shadow-sm" style="border-radius:14px;">
                    <div class="card-body p-0">
                        <div th:each="item : ${cartItems}" class="p-4 border-bottom">
                            <div class="row align-items-center g-3">
                                <div class="col-auto">
                                    <img th:src="${item.imageUrl}" alt="img"
                                         style="width:80px;height:80px;object-fit:cover;border-radius:10px;border:1px solid #e5e7eb;"
                                         onerror="this.src='https://placehold.co/80x80?text=img'">
                                </div>
                                <div class="col">
                                    <h6 class="fw-bold mb-1" th:text="${item.productName}">Tên SP</h6>
                                    <p class="text-muted small mb-0">Đơn giá:
                                        <strong th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</strong>
                                    </p>
                                </div>
                                <div class="col-auto">
                                    <form th:action="@{/cart/update}" method="post" class="d-flex align-items-center gap-2">
                                        <input type="hidden" name="productId" th:value="${item.productId}" />
                                        <input type="number" name="quantity" th:value="${item.quantity}" min="1"
                                               class="form-control form-control-sm text-center" style="width:70px;"
                                               onchange="this.form.submit()">
                                    </form>
                                </div>
                                <div class="col-auto fw-bold text-danger">
                                    <span th:text="${#numbers.formatDecimal(item.totalPrice, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</span>
                                </div>
                                <div class="col-auto">
                                    <a th:href="@{/cart/remove/{id}(id=${item.productId})}"
                                       class="btn btn-sm btn-outline-danger" title="Xóa">
                                        <i class="bi bi-x-lg"></i>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="card-footer bg-transparent p-4 d-flex gap-2">
                        <a href="/cart/clear" class="btn btn-outline-danger"
                           onclick="return confirm('Xóa toàn bộ giỏ hàng?')">
                            <i class="bi bi-trash me-1"></i>Xóa tất cả
                        </a>
                        <a href="/shop" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left me-1"></i>Tiếp tục mua
                        </a>
                    </div>
                </div>
            </div>

            <!-- Order Summary -->
            <div class="col-lg-4">
                <div class="card border-0 shadow-sm" style="border-radius:14px;">
                    <div class="card-body p-4">
                        <h5 class="fw-bold mb-4">Tóm Tắt Đơn Hàng</h5>
                        <div class="d-flex justify-content-between mb-2 text-muted">
                            <span>Tạm tính</span>
                            <span th:text="${#numbers.formatDecimal(totalAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</span>
                        </div>
                        <div class="d-flex justify-content-between mb-2 text-muted">
                            <span>Phí vận chuyển</span><span class="text-success">Miễn phí</span>
                        </div>
                        <hr>
                        <div class="d-flex justify-content-between fw-bold fs-5 mb-4">
                            <span>Tổng cộng</span>
                            <span class="text-danger"
                                  th:text="${#numbers.formatDecimal(totalAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</span>
                        </div>
                        <!-- Nếu chưa đăng nhập → yêu cầu đăng nhập -->
                        <div sec:authorize="!isAuthenticated()">
                            <a href="/login" class="btn btn-success btn-lg w-100 fw-bold">
                                <i class="bi bi-box-arrow-in-right me-2"></i>Đăng nhập để đặt hàng
                            </a>
                        </div>
                        <div sec:authorize="isAuthenticated()">
                            <a href="/checkout" class="btn btn-success btn-lg w-100 fw-bold">
                                Đặt hàng <i class="bi bi-arrow-right ms-2"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="bg-dark text-light py-4 mt-auto">
    <div class="container text-center">
        <p class="mb-0 small">&copy; 2026 Laptop Shop. All rights reserved.</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
