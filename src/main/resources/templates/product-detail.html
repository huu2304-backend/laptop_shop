<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${product.name} + ' - Laptop Shop'">Chi Tiết Sản Phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-light d-flex flex-column min-vh-100">

<div th:replace="~{fragments/navbar :: navbar('')}"></div>

<!-- Breadcrumb -->
<div class="container py-3">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb mb-0">
            <li class="breadcrumb-item"><a href="/">Trang chủ</a></li>
            <li class="breadcrumb-item"><a href="/shop">Cửa hàng</a></li>
            <li class="breadcrumb-item active" th:text="${product.name}">Tên sản phẩm</li>
        </ol>
    </nav>
</div>

<div class="container mb-5">
    <div class="card border-0 shadow-sm" style="border-radius:16px;">
        <div class="card-body p-4 p-md-5">
            <!-- Flash Messages -->
            <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show mb-4" role="alert">
                <i class="bi bi-exclamation-circle-fill me-2"></i><span th:text="${errorMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show mb-4" role="alert">
                <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="row g-5">
                <!-- Product Image -->
                <div class="col-md-5 text-center">
                    <img th:src="${product.imageUrl}" class="img-fluid rounded-3"
                         alt="Product Image" style="max-height:400px;object-fit:contain;"
                         onerror="this.src='https://placehold.co/600x400?text=No+Image'">
                </div>

                <!-- Product Info -->
                <div class="col-md-7">
                    <span class="badge bg-primary bg-opacity-10 text-primary border border-primary border-opacity-25 mb-3"
                          th:text="${product.categoryName}">Danh mục</span>
                    <h1 class="fw-bold h2 mb-3" th:text="${product.name}">Laptop Dell XPS 15</h1>
                    <h2 class="text-danger fw-bold mb-4 h3"
                        th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</h2>

                    <div class="mb-4">
                        <span class="fw-semibold">Tình trạng: </span>
                        <span class="text-success fw-bold" th:if="${product.quantity > 0}">
                            <i class="bi bi-check-circle-fill me-1"></i>Còn hàng
                            (<span th:text="${product.quantity}"></span> sản phẩm)
                        </span>
                        <span class="text-danger fw-bold" th:if="${product.quantity <= 0}">
                            <i class="bi bi-x-circle-fill me-1"></i>Tạm hết hàng
                        </span>
                    </div>

                    <!-- Thêm vào giỏ: CHỈ cho USER -->
                    <div sec:authorize="!hasRole('ADMIN')">
                        <form th:action="@{/cart/add}" method="post"
                              class="mb-4 bg-light p-4 rounded-3">
                            <input type="hidden" name="productId" th:value="${product.id}" />
                            <div class="row align-items-center g-2">
                                <div class="col-auto">
                                    <label for="quantity" class="col-form-label fw-semibold">Số lượng:</label>
                                </div>
                                <div class="col-auto">
                                    <input type="number" id="quantity" name="quantity" class="form-control"
                                           value="1" min="1" th:max="${product.quantity}" style="width:90px;">
                                </div>
                                <div class="col">
                                    <button type="submit" class="btn btn-primary btn-lg w-100"
                                            th:disabled="${product.quantity <= 0}">
                                        <i class="bi bi-cart-plus me-2"></i>Thêm Vào Giỏ Hàng
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>

                    <!-- Admin thông báo không thể mua hàng -->
                    <div sec:authorize="hasRole('ADMIN')" class="alert alert-warning mb-4">
                        <i class="bi bi-info-circle-fill me-2"></i>
                        Bạn đang xem với vai trò <strong>Admin</strong>. Admin không thể thêm vào giỏ hàng.
                        <a th:href="@{/admin/products/edit/{id}(id=${product.id})}" class="btn btn-sm btn-outline-dark ms-2">
                            <i class="bi bi-pencil me-1"></i>Chỉnh sửa sản phẩm này
                        </a>
                    </div>

                    <!-- Mô tả -->
                    <div class="card bg-light border-0">
                        <div class="card-body">
                            <h5 class="fw-bold mb-3"><i class="bi bi-info-circle-fill text-info me-2"></i>Mô tả sản phẩm</h5>
                            <div th:utext="${#strings.replace(product.description, '&#10;', '<br/>')}">
                                Chi tiết cấu hình...
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="bg-dark text-light py-4 mt-auto">
    <div class="container text-center">
        <p class="mb-0 small">&copy; 2026 Laptop Shop. All rights reserved.</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
