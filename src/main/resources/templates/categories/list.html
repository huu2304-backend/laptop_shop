<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Danh Sách Hãng Sản Xuất</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }

        table {
            width: 70%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            border: 1px solid #dddddd;
            padding: 12px;
            text-align: left;
        }

        th {
            background-color: #f4f4f4;
        }

        .btn {
            padding: 6px 12px;
            text-decoration: none;
            border-radius: 4px;
            border: 1px solid #ccc;
            color: #333;
        }

        .alert {
            padding: 12px;
            margin-top: 15px;
            margin-bottom: 15px;
            border-radius: 4px;
            width: 70%;
        }

        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-danger {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>

<body>
    <h2>Quản Lý Hãng Sản Xuất (Category)</h2>

    <!-- Banners hiển thị thông báo -->
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <a th:href="@{/categories/add}" class="btn">Thêm Mới Hãng</a>

    <a th:href="@{/products}" class="btn">Quản lý sản phẩm</a>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Tên Hãng</th>
                <th>Mô Tả</th>
                <th>Hành Động</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="category : ${categories}">
                <td th:text="${category.id}">1</td>
                <td th:text="${category.name}">Dell</td>
                <td th:text="${category.description}">Laptop văn phòng</td>
                <td>
                    <a th:href="@{/categories/edit/{id}(id=${category.id})}" class="btn">Sửa</a>
                    <form th:action="@{/categories/delete/{id}(id=${category.id})}" method="post"
                        style="display:inline;">
                        <button type="submit" class="btn"
                            onclick="return confirm('Bạn có chắc chắn muốn xóa hãng này?')">Xóa
                        </button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
</body>

</html>
