<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Danh Sách Danh Mục</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .sidebar {
            height: 100vh;
            background-color: #343a40;
            padding-top: 20px;
            position: fixed;
            width: 250px;
            transition: all 0.3s;
        }
        .sidebar a {
            padding: 15px 25px;
            text-decoration: none;
            font-size: 16px;
            color: #d1d8e0;
            display: block;
            border-left: 4px solid transparent;
            transition: all 0.3s;
        }
        .sidebar a:hover, .sidebar a.active {
            color: #ffffff;
            background-color: #495057;
            border-left: 4px solid #0d6efd;
        }
        .sidebar a i {
            margin-right: 10px;
            width: 20px;
            text-align: center;
        }
        .main-content {
            margin-left: 250px;
            padding: 20px 40px;
            transition: all 0.3s;
        }
        .header {
            background-color: #ffffff;
            padding: 15px 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .table-container {
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            overflow: hidden;
        }
        .table thead th {
            background-color: #f8f9fa;
            border-bottom: 2px solid #dee2e6;
            color: #495057;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 0.5px;
            padding: 15px;
        }
        .table tbody td {
            vertical-align: middle;
            padding: 15px;
            border-bottom: 1px solid #f1f3f5;
        }
        .table tbody tr:hover {
            background-color: #f8f9fa;
        }
        .btn-action {
            padding: 6px 12px;
            border-radius: 6px;
            transition: all 0.2s;
        }
    </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <div class="text-center mb-4 px-4">
        <h4 class="text-white fw-bold"><i class="bi bi-laptop"></i> Admin Panel</h4>
        <hr class="text-secondary">
    </div>
    <a href="/products"><i class="bi bi-box-seam"></i> Quản lý Sản phẩm</a>
    <a href="/categories" class="active"><i class="bi bi-tags"></i> Quản lý Danh mục</a>
    <a href="/admin/orders"><i class="bi bi-cart-check"></i> Quản lý Đơn hàng</a>
    <a href="/" class="mt-5 text-warning"><i class="bi bi-house-door"></i> Về Trang chủ</a>
</div>

<!-- Main Content -->
<div class="main-content">
    
    <!-- Header -->
    <div class="header">
        <h4 class="m-0 fw-bold text-dark">Hệ Thống Quản Lý</h4>
        <div sec:authorize="isAuthenticated()">
            <span class="me-3 text-secondary">Xin chào, <strong class="text-dark" sec:authentication="name">User</strong>!</span>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-warning btn-sm fw-bold">Đăng Xuất</button>
            </form>
        </div>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold m-0">Quản Lý Danh Mục (Category)</h2>
        <a sec:authorize="hasRole('ADMIN')" href="/categories/add" class="btn btn-primary btn-lg shadow-sm">
            <i class="bi bi-plus-lg"></i> Thêm Danh Mục Mới
        </a>
    </div>
    
    <!-- Banners hiển thị thông báo -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <!-- Table Container -->
    <div class="table-container mb-4">
        <table class="table table-hover mb-0">
            <thead>
                <tr>
                    <th style="width: 80px;">ID</th>
                    <th>Tên Hãng</th>
                    <th style="width: 40%;">Mô Tả</th>
                    <th sec:authorize="hasRole('ADMIN')" class="text-center" style="width: 150px;">Hành Động</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="category : ${categories}">
                    <td>
                        <strong class="text-dark" th:text="${category.id}">1</strong>
                    </td>
                    <td>
                        <span class="fw-bold" th:text="${category.name}">Dell</span>
                    </td>
                    <td>
                        <div class="text-muted small" style="display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;" th:text="${category.description}">Laptop văn phòng</div>
                    </td>
                    <td sec:authorize="hasRole('ADMIN')" class="text-center">
                        <a th:href="@{/categories/edit/{id}(id=${category.id})}" class="btn btn-outline-primary btn-action me-1" title="Sửa">
                            <i class="bi bi-pencil-square"></i>
                        </a>
                        <form th:action="@{/categories/delete/{id}(id=${category.id})}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-outline-danger btn-action" title="Xóa"
                                    onclick="return confirm('Bạn có chắc chắn muốn xóa hãng này không?')">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${categories.empty}">
                    <td th:colspan="${#authorization.expression('hasRole(''ADMIN'')')} ? 4 : 3" style="text-align: center; padding: 20px; color: #666;">Không tìm thấy danh mục nào.</td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
