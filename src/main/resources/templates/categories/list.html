<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Danh Sách Hãng Sản Xuất</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }

        table {
            width: 70%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            border: 1px solid #dddddd;
            padding: 12px;
            text-align: left;
        }

        th {
            background-color: #f4f4f4;
        }

        .btn {
            padding: 6px 12px;
            text-decoration: none;
            border-radius: 4px;
            border: 1px solid #ccc;
            color: #333;
        }

        .btn-add {
            background-color: #4CAF50;
            color: white;
            border-color: #4CAF50;
        }

        .alert {
            padding: 12px;
            margin-top: 15px;
            margin-bottom: 15px;
            border-radius: 4px;
            width: 70%;
        }

        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-danger {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #f8f9fa;
            padding: 15px 30px;
            border-bottom: 1px solid #e7e7e7;
            margin: -40px -40px 40px -40px;
        }
        
        .header-title {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin: 0;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-name {
            font-weight: bold;
            color: #555;
        }

        .btn-logout {
            background-color: #ff9800;
            color: white;
            border-color: #ff9800;
        }

        .btn-logout:hover {
            background-color: #e68a00;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1 class="header-title">Hệ Thống Quản Lý</h1>
        <div class="user-info">
            <!-- Hiển thị khi đã đăng nhập -->
            <div sec:authorize="isAuthenticated()">
                <span class="user-name">Xin chào, <span sec:authentication="name">User</span>!</span>
                <form th:action="@{/logout}" method="post" style="display:inline; margin-left: 10px;">
                    <button type="submit" class="btn btn-logout">Đăng Xuất</button>
                </form>
            </div>
            <!-- Hiển thị khi chưa đăng nhập -->
            <div sec:authorize="!isAuthenticated()">
                <a th:href="@{/login}" class="btn">Đăng Nhập</a>
                <a th:href="@{/register}" class="btn btn-add">Đăng Ký</a>
            </div>
        </div>
    </div>
    <h2>Quản Lý Hãng Sản Xuất (Category)</h2>

    <!-- Banners hiển thị thông báo -->
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <a th:href="@{/categories/add}" class="btn">Thêm Mới Hãng</a>

    <a th:href="@{/products}" class="btn">Quản lý sản phẩm</a>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Tên Hãng</th>
                <th>Mô Tả</th>
                <th>Hành Động</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="category : ${categories}">
                <td th:text="${category.id}">1</td>
                <td th:text="${category.name}">Dell</td>
                <td th:text="${category.description}">Laptop văn phòng</td>
                <td>
                    <a th:href="@{/categories/edit/{id}(id=${category.id})}" class="btn">Sửa</a>
                    <form th:action="@{/categories/delete/{id}(id=${category.id})}" method="post"
                        style="display:inline;">
                        <button type="submit" class="btn"
                            onclick="return confirm('Bạn có chắc chắn muốn xóa hãng này?')">Xóa
                        </button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
</body>

</html>
