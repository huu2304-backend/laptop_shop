<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Mua laptop chính hãng tại Laptop Shop - Giá tốt, bảo hành dài hạn.">
    <title>Laptop Shop - Cửa Hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .card-product { transition: transform 0.3s ease, box-shadow 0.3s ease; height: 100%; border-radius: 14px !important; }
        .card-product:hover { transform: translateY(-5px); box-shadow: 0 12px 28px rgba(0,0,0,0.1) !important; }
        .product-img { height: 200px; object-fit: cover; padding: 1rem; border-radius: 14px 14px 0 0; }
        .filter-sidebar { background: #fff; border-radius: 14px; padding: 24px; position: sticky; top: 80px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .price-tag { color: #dc3545; font-weight: 700; font-size: 1rem; }
    </style>
</head>
<body class="bg-light d-flex flex-column min-vh-100">

<div th:replace="~{fragments/navbar :: navbar('shop')}"></div>

<div class="container py-4">
    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/">Trang chủ</a></li>
            <li class="breadcrumb-item active">Cửa hàng</li>
        </ol>
    </nav>

    <!-- Flash Messages -->
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-circle-fill me-2"></i><span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row g-4">
        <!-- Sidebar Filter -->
        <div class="col-lg-3">
            <div class="filter-sidebar border">
                <h5 class="fw-bold mb-4"><i class="bi bi-funnel-fill me-2 text-primary"></i>Bộ Lọc</h5>
                <form action="/shop" method="get">
                    <div class="mb-3">
                        <label class="form-label fw-semibold small text-muted">Tên sản phẩm</label>
                        <input type="text" class="form-control" name="name" placeholder="Tìm theo tên..." th:value="${name}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold small text-muted">Danh mục</label>
                        <select class="form-select" name="categoryId">
                            <option value="">Tất cả danh mục</option>
                            <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"
                                    th:selected="${cat.id == categoryId}"></option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold small text-muted">Mức giá</label>
                        <select class="form-select" name="priceRange">
                            <option value="">Tất cả mức giá</option>
                            <option value="0-10000000"        th:selected="${priceRange == '0-10000000'}">Dưới 10 triệu</option>
                            <option value="10000000-15000000"  th:selected="${priceRange == '10000000-15000000'}">10 - 15 triệu</option>
                            <option value="15000000-20000000"  th:selected="${priceRange == '15000000-20000000'}">15 - 20 triệu</option>
                            <option value="20000000-30000000"  th:selected="${priceRange == '20000000-30000000'}">20 - 30 triệu</option>
                            <option value="30000000-"          th:selected="${priceRange == '30000000-'}">Trên 30 triệu</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold small text-muted">Sắp xếp</label>
                        <div class="d-flex gap-2">
                            <select class="form-select" name="sortField">
                                <option value="id"    th:selected="${sortField == 'id'}">Mới nhất</option>
                                <option value="price" th:selected="${sortField == 'price'}">Giá</option>
                                <option value="name"  th:selected="${sortField == 'name'}">Tên (A-Z)</option>
                            </select>
                            <select class="form-select" name="sortDir">
                                <option value="desc" th:selected="${sortDir == 'desc'}">Giảm</option>
                                <option value="asc"  th:selected="${sortDir == 'asc'}">Tăng</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mb-2">Áp dụng</button>
                    <a href="/shop" class="btn btn-outline-secondary w-100">Xóa bộ lọc</a>
                </form>
            </div>
        </div>

        <!-- Product Grid -->
        <div class="col-lg-9">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-bold m-0">Tất cả sản phẩm</h3>
                <span class="text-muted small"
                      th:text="'Hiển thị ' + ${products.numberOfElements} + ' / ' + ${products.totalElements} + ' sản phẩm'"></span>
            </div>

            <div th:if="${products.empty}" class="alert alert-warning text-center py-5">
                <i class="bi bi-search fs-1 d-block mb-3"></i>
                <h5>Không tìm thấy sản phẩm nào phù hợp.</h5>
                <a href="/shop" class="btn btn-primary mt-3">Xem tất cả</a>
            </div>

            <div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4 mb-5">
                <div class="col" th:each="product : ${products.content}">
                    <div class="card card-product border-0 shadow-sm">
                        <a th:href="@{/product/{id}(id=${product.id})}">
                            <img th:src="${product.imageUrl}" class="card-img-top product-img bg-white"
                                 alt="Product" onerror="this.src='https://placehold.co/300x200?text=No+Image'">
                        </a>
                        <div class="card-body d-flex flex-column px-3 pb-3">
                            <span class="badge bg-primary bg-opacity-10 text-primary border border-primary border-opacity-25 mb-2 align-self-start"
                                  th:text="${product.categoryName}">Category</span>
                            <h6 class="card-title mb-2" style="height:40px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;">
                                <a th:href="@{/product/{id}(id=${product.id})}" class="text-decoration-none text-dark"
                                   th:text="${product.name}">Tên sản phẩm</a>
                            </h6>
                            <div class="price-tag mt-auto mb-3"
                                 th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</div>

                            <!-- Ẩn nút thêm giỏ với ADMIN -->
                            <div sec:authorize="!hasRole('ADMIN')">
                                <form th:action="@{/cart/add}" method="post">
                                    <input type="hidden" name="productId" th:value="${product.id}" />
                                    <button type="submit" class="btn btn-outline-primary w-100"
                                            th:disabled="${product.quantity <= 0}">
                                        <i class="bi bi-cart-plus me-1"></i>
                                        <span th:text="${product.quantity > 0 ? 'Thêm vào giỏ' : 'Hết hàng'}">Thêm vào giỏ</span>
                                    </button>
                                </form>
                            </div>
                            <div sec:authorize="hasRole('ADMIN')">
                                <a th:href="@{/product/{id}(id=${product.id})}" class="btn btn-outline-secondary w-100">
                                    <i class="bi bi-eye me-1"></i>Xem Chi Tiết
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Pagination -->
            <nav th:if="${products.totalPages > 1}" class="mt-2">
                <ul class="pagination justify-content-center">
                    <li class="page-item" th:classappend="${products.first ? 'disabled' : ''}">
                        <a class="page-link" th:href="@{/shop(name=${name},categoryId=${categoryId},priceRange=${priceRange},sortField=${sortField},sortDir=${sortDir},page=${products.number - 1})}">
                            &laquo;
                        </a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(0, products.totalPages - 1)}"
                        th:classappend="${products.number == i ? 'active' : ''}">
                        <a class="page-link"
                           th:href="@{/shop(name=${name},categoryId=${categoryId},priceRange=${priceRange},sortField=${sortField},sortDir=${sortDir},page=${i})}"
                           th:text="${i + 1}">1</a>
                    </li>
                    <li class="page-item" th:classappend="${products.last ? 'disabled' : ''}">
                        <a class="page-link" th:href="@{/shop(name=${name},categoryId=${categoryId},priceRange=${priceRange},sortField=${sortField},sortDir=${sortDir},page=${products.number + 1})}">
                            &raquo;
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>

<footer class="bg-dark text-light py-4 mt-auto">
    <div class="container text-center">
        <p class="mb-0 small">&copy; 2026 Laptop Shop. All rights reserved.</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
