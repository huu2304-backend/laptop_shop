<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/admin-layout}">
<head><title>Chỉnh Sửa Sản Phẩm</title></head>
<body>

<th:block layout:fragment="page-title">Chỉnh Sửa Sản Phẩm</th:block>
<th:block layout:fragment="page-subtitle" th:text="${product.name}">Tên sản phẩm</th:block>
<div layout:fragment="topbar-actions">
    <a href="/admin/products" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left me-1"></i>Quay Lại
    </a>
</div>

<div layout:fragment="content">
    <div class="row justify-content-center">
        <div class="col-xl-8">
            <div class="card-section">
                <div class="card-section-header"><i class="bi bi-pencil-square me-2 text-primary"></i>Cập Nhật Thông Tin Sản Phẩm</div>
                <div class="p-4">
                    <form th:action="@{/admin/products/edit/{id}(id=${product.id})}"
                          th:object="${product}" method="post" enctype="multipart/form-data">
                        <input type="hidden" th:field="*{id}" />
                        <input type="hidden" th:field="*{imageUrl}" />

                        <div class="row g-3">
                            <div class="col-md-8">
                                <label class="form-label fw-semibold">Tên Sản Phẩm <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" th:field="*{name}">
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Danh Mục <span class="text-danger">*</span></label>
                                <select class="form-select" th:field="*{categoryId}">
                                    <option value="">-- Chọn danh mục --</option>
                                    <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                                </select>
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('categoryId')}" th:errors="*{categoryId}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Giá (VNĐ) <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <input type="number" step="any" min="0" class="form-control" th:field="*{price}">
                                    <span class="input-group-text">đ</span>
                                </div>
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Số Lượng Tồn Kho <span class="text-danger">*</span></label>
                                <input type="number" min="0" class="form-control" th:field="*{quantity}">
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}"></div>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold">Ảnh Sản Phẩm (Để trống = giữ ảnh cũ)</label>
                                <input type="file" class="form-control" name="imageFile" id="imageInput" accept="image/*">
                                <div class="mt-3 d-flex gap-4 align-items-start">
                                    <div id="currentImageWrapper">
                                        <p class="small fw-semibold text-muted mb-2">Ảnh hiện tại:</p>
                                        <img th:src="*{imageUrl}" id="currentImage"
                                             style="max-width:160px;max-height:160px;object-fit:contain;border-radius:10px;border:1px solid #e5e7eb;"
                                             onerror="this.style.display='none'">
                                    </div>
                                    <div id="previewContainer" style="display:none;">
                                        <p class="small fw-semibold text-primary mb-2">Ảnh mới:</p>
                                        <img id="imagePreview"
                                             style="max-width:160px;max-height:160px;object-fit:contain;border-radius:10px;border:2px solid #6366f1;">
                                    </div>
                                </div>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold">Mô Tả Sản Phẩm</label>
                                <textarea class="form-control" th:field="*{description}" rows="5"></textarea>
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
                            </div>
                        </div>

                        <div class="d-flex gap-3 mt-4 pt-3 border-top">
                            <button type="submit" class="btn btn-primary px-4">
                                <i class="bi bi-save me-1"></i>Cập Nhật
                            </button>
                            <a href="/admin/products" class="btn btn-outline-secondary px-4">Hủy</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts">
    <script>
        document.getElementById('imageInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = ev => {
                    document.getElementById('imagePreview').src = ev.target.result;
                    document.getElementById('previewContainer').style.display = 'block';
                    document.getElementById('currentImage').style.opacity = '0.4';
                };
                reader.readAsDataURL(file);
            } else {
                document.getElementById('previewContainer').style.display = 'none';
                document.getElementById('currentImage').style.opacity = '1';
            }
        });
    </script>
</th:block>

</body>
</html>
