<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layouts/admin-layout}">
<head><title>Quản Lý Sản Phẩm</title></head>
<body>

<th:block layout:fragment="page-title">Quản Lý Sản Phẩm</th:block>
<th:block layout:fragment="page-subtitle">Danh sách tất cả sản phẩm</th:block>
<div layout:fragment="topbar-actions">
    <a href="/admin/products/add" class="btn btn-primary">
        <i class="bi bi-plus-lg me-1"></i>Thêm Sản Phẩm
    </a>
</div>

<div layout:fragment="content">

    <!-- Filter Section -->
    <div class="card-section mb-4">
        <div class="card-section-header"><i class="bi bi-funnel-fill me-2 text-primary"></i>Bộ Lọc Tìm Kiếm</div>
        <div class="p-4">
            <form action="/admin/products" method="get" class="row g-3 align-items-end">
                <div class="col-md-3">
                    <label class="form-label small fw-semibold text-muted">Tên sản phẩm</label>
                    <input type="text" class="form-control" name="name" th:value="${name}" placeholder="Nhập tên...">
                </div>
                <div class="col-md-2">
                    <label class="form-label small fw-semibold text-muted">Danh mục</label>
                    <select class="form-select" name="categoryId">
                        <option value="">Tất cả danh mục</option>
                        <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"
                                th:selected="${cat.id == categoryId}"></option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label small fw-semibold text-muted">Mức giá</label>
                    <select class="form-select" name="priceRange">
                        <option value="">Tất cả mức giá</option>
                        <option value="0-10000000"       th:selected="${priceRange == '0-10000000'}">Dưới 10 triệu</option>
                        <option value="10000000-15000000" th:selected="${priceRange == '10000000-15000000'}">10 - 15 triệu</option>
                        <option value="15000000-20000000" th:selected="${priceRange == '15000000-20000000'}">15 - 20 triệu</option>
                        <option value="20000000-30000000" th:selected="${priceRange == '20000000-30000000'}">20 - 30 triệu</option>
                        <option value="30000000-"         th:selected="${priceRange == '30000000-'}">Trên 30 triệu</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label small fw-semibold text-muted">Sắp xếp</label>
                    <select class="form-select" name="sortField">
                        <option value="id"       th:selected="${sortField == 'id'}">Mặc định</option>
                        <option value="price"    th:selected="${sortField == 'price'}">Giá cả</option>
                        <option value="name"     th:selected="${sortField == 'name'}">Tên</option>
                        <option value="quantity" th:selected="${sortField == 'quantity'}">Tồn kho</option>
                    </select>
                </div>
                <div class="col-md-1">
                    <label class="form-label small fw-semibold text-muted">Thứ tự</label>
                    <select class="form-select" name="sortDir">
                        <option value="desc" th:selected="${sortDir == 'desc'}">Giảm dần</option>
                        <option value="asc"  th:selected="${sortDir == 'asc'}">Tăng dần</option>
                    </select>
                </div>
                <div class="col-md-2 d-flex gap-2">
                    <button type="submit" class="btn btn-primary flex-grow-1">Lọc</button>
                    <a href="/admin/products" class="btn btn-outline-secondary">Xóa</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Table -->
    <div class="card-section">
        <div class="card-section-header d-flex justify-content-between align-items-center">
            <span>Danh Sách Sản Phẩm</span>
            <span class="text-muted small"
                  th:text="${products.totalElements} + ' sản phẩm'">0 sản phẩm</span>
        </div>
        <div th:if="${products.empty}" class="text-center text-muted py-5">
            <i class="bi bi-box-seam fs-1 d-block mb-3"></i>
            Không tìm thấy sản phẩm nào.
        </div>
        <table class="table admin-table mb-0" th:unless="${products.empty}">
            <thead>
                <tr>
                    <th style="width:70px">Ảnh</th>
                    <th>Tên Sản Phẩm</th>
                    <th>Giá</th>
                    <th>Tồn Kho</th>
                    <th>Danh Mục</th>
                    <th style="width:30%">Mô Tả</th>
                    <th class="text-center" style="width:130px">Hành Động</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="product : ${products.content}">
                    <td>
                        <img th:src="${product.imageUrl}" alt="img"
                             style="width:56px;height:56px;object-fit:cover;border-radius:8px;border:1px solid #e5e7eb;"
                             onerror="this.src='https://placehold.co/56x56?text=No+img'">
                    </td>
                    <td><strong th:text="${product.name}">Tên sản phẩm</strong></td>
                    <td class="text-danger fw-semibold"
                        th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</td>
                    <td>
                        <span th:class="${product.quantity > 10 ? 'badge badge-delivered rounded-pill' :
                                         (product.quantity > 0  ? 'badge badge-pending rounded-pill' :
                                                                   'badge badge-cancelled rounded-pill')}"
                              th:text="${product.quantity}">10</span>
                    </td>
                    <td><span class="badge badge-processing rounded-pill" th:text="${product.categoryName}">Danh mục</span></td>
                    <td>
                        <div class="text-muted small" style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;"
                             th:text="${product.description}">Mô tả...</div>
                    </td>
                    <td class="text-center">
                        <a th:href="@{/admin/products/edit/{id}(id=${product.id})}"
                           class="btn btn-sm btn-outline-primary me-1" title="Sửa">
                            <i class="bi bi-pencil-square"></i>
                        </a>
                        <!-- POST form delete (không dùng GET để tránh accidental delete) -->
                        <form th:action="@{/admin/products/delete/{id}(id=${product.id})}"
                              method="post" class="d-inline"
                              onsubmit="return confirm('Bạn có chắc muốn xóa sản phẩm này?')">
                            <button type="submit" class="btn btn-sm btn-outline-danger" title="Xóa">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>

        <!-- Pagination -->
        <div th:if="${products.totalPages > 1}"
             class="d-flex justify-content-between align-items-center p-4 border-top">
            <div class="text-muted small">
                Trang <strong th:text="${products.number + 1}">1</strong>
                / <strong th:text="${products.totalPages}">10</strong>
                (Tổng <strong th:text="${products.totalElements}">100</strong> sản phẩm)
            </div>
            <nav>
                <ul class="pagination mb-0">
                    <li class="page-item" th:classappend="${products.first ? 'disabled' : ''}">
                        <a class="page-link" th:href="@{/admin/products(name=${name},categoryId=${categoryId},priceRange=${priceRange},sortField=${sortField},sortDir=${sortDir},page=${products.number - 1})}">
                            <i class="bi bi-chevron-left"></i>
                        </a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(0, products.totalPages - 1)}"
                        th:classappend="${products.number == i ? 'active' : ''}"
                        th:if="${i >= products.number - 2 and i <= products.number + 2}">
                        <a class="page-link" th:href="@{/admin/products(name=${name},categoryId=${categoryId},priceRange=${priceRange},sortField=${sortField},sortDir=${sortDir},page=${i})}"
                           th:text="${i + 1}">1</a>
                    </li>
                    <li class="page-item" th:classappend="${products.last ? 'disabled' : ''}">
                        <a class="page-link" th:href="@{/admin/products(name=${name},categoryId=${categoryId},priceRange=${priceRange},sortField=${sortField},sortDir=${sortDir},page=${products.number + 1})}">
                            <i class="bi bi-chevron-right"></i>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>

</body>
</html>
