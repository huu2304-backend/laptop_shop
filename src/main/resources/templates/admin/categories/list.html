<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layouts/admin-layout}">
<head><title>Quản Lý Danh Mục</title></head>
<body>

<th:block layout:fragment="page-title">Quản Lý Danh Mục</th:block>
<th:block layout:fragment="page-subtitle">Danh sách hãng / nhóm sản phẩm</th:block>
<div layout:fragment="topbar-actions">
    <a href="/admin/categories/add" class="btn btn-primary">
        <i class="bi bi-plus-lg me-1"></i>Thêm Danh Mục
    </a>
</div>

<div layout:fragment="content">
    <div class="card-section">
        <div class="card-section-header d-flex justify-content-between align-items-center">
            <span>Danh Sách Danh Mục</span>
            <span class="text-muted small" th:text="${categories.size()} + ' danh mục'">0 danh mục</span>
        </div>
        <div th:if="${categories.empty}" class="text-center text-muted py-5">
            <i class="bi bi-tags fs-1 d-block mb-3"></i>Chưa có danh mục nào.
        </div>
        <table class="table admin-table mb-0" th:unless="${categories.empty}">
            <thead>
                <tr>
                    <th style="width:70px">ID</th>
                    <th>Tên Danh Mục</th>
                    <th>Mô Tả</th>
                    <th class="text-center" style="width:150px">Hành Động</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="category : ${categories}">
                    <td><strong class="text-muted" th:text="${category.id}">1</strong></td>
                    <td>
                        <span class="fw-semibold" th:text="${category.name}">Dell</span>
                    </td>
                    <td>
                        <div class="text-muted small"
                             style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;"
                             th:text="${category.description}">Mô tả...</div>
                    </td>
                    <td class="text-center">
                        <a th:href="@{/admin/categories/edit/{id}(id=${category.id})}"
                           class="btn btn-sm btn-outline-primary me-1" title="Sửa">
                            <i class="bi bi-pencil-square"></i>
                        </a>
                        <form th:action="@{/admin/categories/delete/{id}(id=${category.id})}"
                              method="post" class="d-inline"
                              onsubmit="return confirm('Bạn có chắc muốn xóa danh mục này? Không thể xóa nếu còn sản phẩm!')">
                            <button type="submit" class="btn btn-sm btn-outline-danger" title="Xóa">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
